[colors]
background = #10001b
background-alt = #373B41
foreground = #C5C8C6
primary = #ffffff
secondary = #373b41
alert = #FF5555
disabled = #707880
trans = #00000000

[bar/bar]
width = 100%
height = 16pt

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 0pt
border-colors = #000000
 
padding-left = 0
padding-right = 0

module-margin = 1

font-0 = "Hack Nerd Font:size=8;1"

modules-left = launcher xwindow
modules-center = xworkspaces
modules-right = systray cpu memory battery pulseaudio date system

cursor-click = pointer

enable-ipc = true

[module/systray]
type = internal/tray

format-margin = 0pt
tray-spacing = 10pt
tray-size = 15

[module/xworkspaces]
type = internal/xworkspaces

pin-workspaces = true
enable-click = true
enable-scroll = false

icon-default = ÔĎĄ

format = <label-state>
format-padding = 0

label-monitor = %name%
label-active = %icon%
label-active-foreground = ${colors.primary}
; label-active-background = ${colors.secondary}

label-occupied = %icon%
label-occupied-foreground = ${colors.secondary}

label-urgent = %icon%
label-urgent-foreground = ${colors.alert}

label-empty = %icon%

label-active-padding = 2
label-urgent-padding = 2
label-occupied-padding = 2
label-empty-padding = 2

[module/xwindow]
type = internal/xwindow
label = %title:0:55:...%
label-empty = Desktop
label-foreground = ${colors.primary}

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "ůįēĺ "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%
label-volume-foreground = ${colors.primary}
label-muted = muted
label-muted-foreground = ${colors.disabled}

; ===== module rofi =====
[module/launcher]
type = custom/text
format = Óúí
format-background = ${colors.primary}
format-foreground = ${colors.background}
format-padding = 1

click-left = rofi -modi drun -show drun -config ~/.config/rofi/rofidmenu.rasi

[module/system]
type = custom/text

format = ‚ŹĽ
format-background = ${colors.primary}
format-foreground = ${colors.background}
format-padding = 1

click-left = ~/.config/i3/scripts/powermenu
; ==========

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "ůįĎ≠ "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%
label-foreground = ${colors.primary}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "ůįĽ† "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%
label-foreground = ${colors.primary}

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = ůįĖ© connected
label-disconnected = ůįĖ™ disconnected 
label-connected-foreground = ${colors.primary}
label-disconnected-foreground = ${colors.disabled}

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1

date = "%I:%M %p"
date-alt = "%a, %b %d %I:%M %p"

format-prefix = "Ôźļ "
format-prefix-foreground = ${colors.primary}
label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

[module/battery]
type = internal/battery

full-at = 100
low-at = 5

; Use the following command to list batteries and adapters:
; $ ls -1 /sys/class/power_supply/
battery = BAT0
adapter = ADP1

poll-interval = 5

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>

label-charging = %percentage%%
label-discharging = %percentage%%
label-full = ÔČÄ 100%
label-low = ÔČÉ Low

; Only applies if <ramp-capacity> is used
ramp-capacity-0 = ÔČĄ
ramp-capacity-1 = ÔČÉ
ramp-capacity-2 = ÔČā
ramp-capacity-3 = ÔČĀ
ramp-capacity-4 = ÔČÄ

; Only applies if <bar-capacity> is used
bar-capacity-width = 10

; Only applies if <animation-charging> is used
animation-charging-0 = ÔČĄ
animation-charging-1 = ÔČÉ
animation-charging-2 = ÔČā
animation-charging-3 = ÔČĀ
animation-charging-4 = ÔČÄ
; Framerate in milliseconds
animation-charging-framerate = 750

; Only applies if <animation-discharging> is used
animation-discharging-0 = ÔČÄ
animation-discharging-1 = ÔČĀ
animation-discharging-2 = ÔČā
animation-discharging-3 = ÔČÉ
animation-discharging-4 = ÔČĄ
; Framerate in milliseconds
animation-discharging-framerate = 500

; Only applies if <animation-low> is used
animation-low-0 = !
animation-low-1 = 
animation-low-framerate = 200
